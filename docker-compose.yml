version: '3.8'

services:
  api:
    image: ${DOCKER_USERNAME}/foodclub-api:latest
    container_name: foodclub-api
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
    ports:
      - "${PORT}:${PORT}"
    restart: unless-stopped

networks:
  foodclub-network:
    driver: bridge

volumes:
  postgres_data: 